name: publish queue

on:
  schedule:
    - cron: '0 17 * * 1,3,5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install atproto
      - run: python .github/scripts/publish-queue.py
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASS: ${{ secrets.BLUESKY_APP_PASS }}
      - run: |
          git config user.name "numbpilled bot"
          git config user.email "bot@numbpilled.bsky.social"
          git add -A
          git diff --staged --quiet || git commit -m "auto: remove published draft"
          git push
